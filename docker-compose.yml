services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eduos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduos}
      POSTGRES_DB: ${POSTGRES_DB:-eduos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eduos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eduos}:${POSTGRES_PASSWORD:-eduos}@db:5432/${POSTGRES_DB:-eduos}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@sumaya.edu}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
    ports:
      - "8000:8000"
    # Seed first (idempotent), then serve.
    command: sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"

volumes:
  pgdata:
